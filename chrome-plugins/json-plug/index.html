<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 20px 0;
      color: #fff;
    }
    .container {
      display: flex;
      flex-direction: row;
      gap: 16px;
      height: calc(100vh - 80px);
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 14px;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      background: #252526;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      resize: none;
    }
    textarea:focus {
      outline: none;
      border-color: #007acc;
    }
    .btn-group {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-format {
      background: #0e639c;
      color: #fff;
    }
    .btn-format:hover {
      background: #1177bb;
    }
    .btn-clear {
      background: #3c3c3c;
      color: #d4d4d4;
    }
    .btn-clear:hover {
      background: #4a4a4a;
    }
    #error {
      color: #f48771;
      font-size: 13px;
      min-height: 20px;
      word-break: break-all;
    }
    #output {
      flex: 1;
      margin: 0;
      padding: 14px;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      overflow: auto;
    }
  </style>
  <link rel="stylesheet" href="hljs-theme.min.css">
</head>
<body>
  <h1>JSON 格式化工具</h1>
  <div class="container">
    <div class="panel">
      <textarea id="input" placeholder="在此输入 JSON 字符串..."></textarea>
      <div class="btn-group">
        <button class="btn-format" id="formatBtn">格式化</button>
        <button class="btn-clear" id="clearBtn">清空</button>
      </div>
      <div id="error"></div>
    </div>
    <div class="panel">
      <pre id="output"></pre>
    </div>
  </div>
  <script src="hljs.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
